/* 辞書キーを長い順にソート（部分一致の誤置換を防止） */
var dictKeys = Object.keys(ttsDictionary).sort(function(a, b) {
  return b.length - a.length;
});

function applyDictionary(text) {
  var result = text;
  for (var i = 0; i < dictKeys.length; i++) {
    var key = dictKeys[i];
    /* 単語境界を考慮した置換（日本語混在のため前後の文字種で判定） */
    var escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var regex = new RegExp(escaped, 'g');
    result = result.replace(regex, ttsDictionary[key]);
  }
  return result;
}

if (!('speechSynthesis' in window)) {
  document.addEventListener('DOMContentLoaded', function() {
    showStatus('このブラウザは音声再生に対応していません。Chrome または Safari をお使いください。', true);
  });
}

/* ============================================================
   【対策3】音声リスト読み込み待ち（getVoices空配列対策）
   ============================================================ */
function loadVoices() {
  var voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) voicesReady = true;
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

/* ============================================================
   【対策1】iOS Safari 初回タップ無音対策（warmUpパターン）
   ============================================================ */
function warmUp() {
  if (initialized) return;
  initialized = true;
  var dummy = new SpeechSynthesisUtterance('');
  dummy.volume = 0;
  dummy.lang = 'ja-JP';
  window.speechSynthesis.speak(dummy);
  window.speechSynthesis.cancel();
}
document.addEventListener('touchstart', warmUp, { once: true });
document.addEventListener('click', warmUp, { once: true });

/* ============================================================
   【対策2】Chrome 長文途切れ対策（15秒問題 keepAlive）
   ============================================================ */
function startKeepAlive() {
  stopKeepAlive();
  keepAliveTimer = setInterval(function() {
    if (speaking && !paused && window.speechSynthesis.speaking) {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 10000);
}
function stopKeepAlive() {
  if (keepAliveTimer) {
    clearInterval(keepAliveTimer);
    keepAliveTimer = null;
  }
}

/* ============================================================
   コンテンツ構築
   ============================================================ */
function buildContent() {
  var area = document.getElementById('contentArea');
  var html = '';
  var textCount = 0;
  textIndices = [];

  for (var i = 0; i < content.length; i++) {
    var item = content[i];
    if (item.type === 'chapter') {
      html += '<div class="chapter-title" data-chapter="' + item.chapter + '">' + item.text + '</div>';
    } else {
      html += '<div class="paragraph" data-index="' + textCount + '" data-content-index="' + i + '">' + item.text + '</div>';
      textIndices.push(i);
      textCount++;
    }
  }
  area.innerHTML = html;
  paragraphElements = document.querySelectorAll('.paragraph');
}

function buildChapterNav() {
  var nav = document.getElementById('chapterNav');
  var html = '';
  for (var i = 0; i < chapters.length; i++) {
    html += '<button class="chapter-btn" data-chapter="' + chapters[i].id + '" onclick="jumpToChapter(' + chapters[i].id + ')">' + chapters[i].label + '</button>';
  }
  nav.innerHTML = html;
}

/* ============================================================
   章ジャンプ
   ============================================================ */
function jumpToChapter(chapterId) {
  /* 該当章の最初のtext段落を探す */
  for (var i = 0; i < textIndices.length; i++) {
    if (content[textIndices[i]].chapter === chapterId) {
      if (speaking) {
        window.speechSynthesis.cancel();
        currentIndex = i;
        speakParagraph(currentIndex);
      } else {
        currentIndex = i;
        highlightParagraph(i);
      }
      updateChapterHighlight(chapterId);
      return;
    }
  }
}

function updateChapterHighlight(chapterId) {
  var btns = document.querySelectorAll('.chapter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    if (parseInt(btns[i].getAttribute('data-chapter')) === chapterId) {
      btns[i].classList.add('active');
    }
  }
}

/* ============================================================
   ハイライト・スクロール
   ============================================================ */
function clearHighlights() {
  var all = document.querySelectorAll('.paragraph.highlight');
  for (var i = 0; i < all.length; i++) {
    all[i].classList.remove('highlight');
  }
}

function highlightParagraph(idx) {
  clearHighlights();
  var el = paragraphElements[idx];
  if (el) {
    el.classList.add('highlight');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  /* プログレスバー更新 */
  var pct = textIndices.length > 0 ? ((idx + 1) / textIndices.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  /* 章ナビ更新 */
  if (textIndices[idx] !== undefined) {
    updateChapterHighlight(content[textIndices[idx]].chapter);
  }
}

/* ============================================================
   段落再生
   ============================================================ */
function speakParagraph(idx) {
  if (idx >= textIndices.length) {
    speaking = false;
    stopKeepAlive();
    clearHighlights();
    showStatus('再生完了');
    document.getElementById('btnPlay').textContent = '▶ 再生';
    document.getElementById('progressBar').style.width = '100%';
    setTimeout(hideStatus, 3000);
    return;
  }
  currentIndex = idx;
  highlightParagraph(idx);
  showStatus('再生中… (' + (idx + 1) + '/' + textIndices.length + ')');

  var originalText = content[textIndices[idx]].text;
  var spokenText = applyDictionary(originalText);

  var utterance = new SpeechSynthesisUtterance(spokenText);
  utterance.lang = 'ja-JP';
  utterance.rate = speechRate;

  /* 【対策3】日本語音声を優先的に選択 */
  var voices = window.speechSynthesis.getVoices();
  for (var v = 0; v < voices.length; v++) {
    if (voices[v].lang === 'ja-JP' || voices[v].lang.indexOf('ja') === 0) {
      utterance.voice = voices[v];
      break;
    }
  }

  utterance.onend = function() {
    if (speaking && !paused) {
      speakParagraph(idx + 1);
    }
  };

  /* 【対策4】エラーをUIに通知 */
  utterance.onerror = function(e) {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    showStatus('音声エラー: ' + (e.error || '不明') + ' — 次の段落へ', true);
    if (speaking && !paused) {
      setTimeout(function() { speakParagraph(idx + 1); }, 500);
    }
  };

  window.speechSynthesis.speak(utterance);
}

/* ============================================================
   再生コントロール
   ============================================================ */
function startSpeech() {
  if (!('speechSynthesis' in window)) {
    showStatus('このブラウザは音声再生に対応していません', true);
    return;
  }
  warmUp();
  if (paused) {
    paused = false;
    window.speechSynthesis.resume();
    startKeepAlive();
    showStatus('再生再開');
    document.getElementById('btnPlay').textContent = '▶ 再生中';
    return;
  }
  window.speechSynthesis.cancel();
  speaking = true;
  paused = false;
  startKeepAlive();
  document.getElementById('btnPlay').textContent = '▶ 再生中';
  speakParagraph(currentIndex);
}

function pauseSpeech() {
  if (speaking) {
    paused = true;
    stopKeepAlive();
    window.speechSynthesis.pause();
    showStatus('一時停止中 (' + (currentIndex + 1) + '/' + textIndices.length + ')');
    document.getElementById('btnPlay').textContent = '▶ 再開';
  }
}

function stopSpeech() {
  speaking = false;
  paused = false;
  currentIndex = 0;
  stopKeepAlive();
  window.speechSynthesis.cancel();
  clearHighlights();
  hideStatus();
  document.getElementById('btnPlay').textContent = '▶ 再生';
  document.getElementById('progressBar').style.width = '0%';
  updateChapterHighlight(-1);
}

function skipNext() {
  if (currentIndex < textIndices.length - 1) {
    if (speaking) {
      window.speechSynthesis.cancel();
      currentIndex++;
      speakParagraph(currentIndex);
    } else {
      currentIndex++;
      highlightParagraph(currentIndex);
    }
  }
}

function skipPrev() {
  if (currentIndex > 0) {
    if (speaking) {
      window.speechSynthesis.cancel();
      currentIndex--;
      speakParagraph(currentIndex);
    } else {
      currentIndex--;
      highlightParagraph(currentIndex);
    }
  }
}

function changeSpeed() {
  speechRate = parseFloat(document.getElementById('speedSelect').value);
  if (speaking && !paused) {
    window.speechSynthesis.cancel();
    speakParagraph(currentIndex);
  }
}

/* ============================================================
   段落タップで再生位置変更
   ============================================================ */
document.addEventListener('click', function(e) {
  var el = e.target.closest('.paragraph');
  if (!el) return;
  var idx = parseInt(el.getAttribute('data-index'));
  if (isNaN(idx)) return;
  if (speaking) {
    window.speechSynthesis.cancel();
    currentIndex = idx;
    speakParagraph(currentIndex);
  } else {
    currentIndex = idx;
    highlightParagraph(idx);
  }
});

/* ============================================================
   画面が非表示→表示に戻った時の復帰処理（スマホのタブ切替対策）
   ============================================================ */
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    /* バックグラウンドではkeepAlive不要 */
    stopKeepAlive();
  } else {
    /* フォアグラウンド復帰 */
    if (speaking && !paused) {
      startKeepAlive();
      /* Chromeで復帰後に止まっていたら再開 */
      if (!window.speechSynthesis.speaking) {
        speakParagraph(currentIndex);
      }
    }
  }
});

/* ============================================================
   初期化
   ============================================================ */
buildContent();
buildChapterNav();
</script>
</body>
</html>
